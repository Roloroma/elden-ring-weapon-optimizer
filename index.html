    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon32x32.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon48x48.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

      rel="preload"

    />
    <title>Elden Ring Weapon Calculator</title>
    <link rel="canonical" href="%VITE_HOST%%BASE_URL%" />

    <!-- GitHub Pages SPA fallback: see public/404.html -->
    <script>
      (function () {
        const url = new URL(window.location.href);
        const p = url.searchParams.get("p");
        if (!p) return;
        url.searchParams.delete("p");
        const search = url.searchParams.toString();
        const next = p + (search ? "?" + search : "") + url.hash;
        window.history.replaceState(null, "", next);
      })();
    </script>
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "%VITE_CF_BEACON%"}'
    ></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Vite expects the entry module to be root-absolute; base is applied during build output. -->
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
