<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages doesn't support SPA rewrites. This 404 page redirects back to the app root
      // while preserving the original path in a query param that index.html will restore.
      //
      // If you rename the repository, update this BASE value to match the Pages subpath.
      const BASE = "/elden-ring-weapon-optimizer/";

      const { pathname, search, hash } = window.location;
      const target = BASE + "?p=" + encodeURIComponent(pathname) + search + hash;
      window.location.replace(target);
    </script>
  </head>
  <body></body>
</html>
